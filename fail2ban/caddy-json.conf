[Definition]
datepattern = "ts":"%%Y-%%m-%%dT%%H:%%M:%%S\.%%fZ"
# Matches JSON logs where the status code is 401, 403, or 404.
# It captures the IP address from your "client_ip" field.
failregex = ^.*"client_ip":"<HOST>".*"status":(401|403|404).*$
# Ignore your own local IPs so you don't ban yourself
ignoreregex = ^.*"client_ip":"(192\.168\.|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|127\.0\.0\.1).*$

