services:
  immich-server:
    # Self-hosted photo and video backup solution (Google Photos alternative)
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:v3.0.2
    env_file: ./.env
    volumes:
      - ${IMMICH_UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-postgres
      - REDIS_HOSTNAME=immich-redis
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
    depends_on:
      immich-redis:
        condition: service_started
      immich-postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      disable: false
    networks:
      - default
      - caddy_network

  immich-machine-learning:
    # ML service for face recognition, object detection, and smart search
    container_name: immich-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:v3.0.2
    env_file: ./.env
    volumes:
      - model-cache:/cache
    environment:
      - DB_HOSTNAME=immich-postgres
      - REDIS_HOSTNAME=immich-redis
    restart: always
    healthcheck:
      disable: false

  immich-redis:
    # In-memory cache for Immich (using Valkey, a Redis fork)
    container_name: immich-redis
    image: docker.io/valkey/valkey:9@sha256:8e8d64b405ce18f41b8e5ee20aa4687a8ed0022d1298f2ce31cdcf3a76e09411
    env_file: ./.env
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  immich-postgres:
    # PostgreSQL with vector extensions for Immich's ML features
    container_name: immich-postgres
    image: ghcr.io/immich-app/postgres:16-vectorchord0.4.3-pgvectors0.2.0@sha256:1a078b237c1d9b420b0ee59147386b4aa60d3a07a8e6a402fc84a57e41b043a4
    env_file: ./.env
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      DB_STORAGE_TYPE: "SSD"
    volumes:
      - ${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data
    # Shared memory size for PostgreSQL performance (especially for ML queries)
    shm_size: 128mb
    restart: always

volumes:
  model-cache:

networks:
  caddy_network:
    external: true
    name: caddy_network
