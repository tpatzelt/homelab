services:
  caddy:
    # Custom Caddy build with Cloudflare DNS module for ACME DNS challenge
    image: caddy-cloudflare
    build: .
    restart: unless-stopped
    container_name: caddy
    env_file: ./.env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - /opt/dockerdata/caddy/data:/data
      - /opt/dockerdata/caddy/config:/config
      - /opt/dockerdata/caddy/logs:/var/log/caddy
      - /opt/dockerdata/caddy/goaccess:/var/www/goaccess  

    depends_on:
      crowdsec:
        condition: service_healthy
    networks:
      - caddy_network

  goaccess:
    image: allinurl/goaccess
    container_name: goaccess
    restart: unless-stopped
    volumes:
      - /opt/dockerdata/caddy/logs/:/var/log/caddy:ro
      - /opt/dockerdata/caddy/goaccess:/var/www/goaccess
      - ./GeoLite2-City.mmdb:/opt/GeoLite2-City.mmdb:ro
    command: >
      /var/log/caddy/wildcard-access.log
      --log-format=CADDY
      --real-time-html
      --port=7890
      --ws-url=wss://goaccess.dev.tim-boo.com:443/ws
      --origin=https://goaccess.dev.tim-boo.com
      --geoip-database=/opt/GeoLite2-City.mmdb
      --enable-debug
      -o /var/www/goaccess/index.html
    networks:
      - caddy_network

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - GID=1000
      - COLLECTIONS=crowdsecurity/caddy crowdsecurity/base-http-scenarios crowdsecurity/http-cve crowdsecurity/linux
    volumes:
      - /opt/dockerdata/crowdsec/config:/etc/crowdsec
      - /opt/dockerdata/crowdsec/data:/var/lib/crowdsec/data
      - /opt/dockerdata/caddy/logs:/var/log/caddy:ro   # same log mount as goaccess
      - /var/log:/var/log/host:ro                       # for linux/sshd scenarios
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - caddy_network

networks:
  caddy_network:
    name: caddy_network
    driver: bridge
