services:
  annabel-rene-frontend:
    image: ghcr.io/tpatzelt/annabel-rene-frontend:latest-root
    container_name: annabel-rene-frontend
    restart: unless-stopped
    environment:
      PUBLIC_SITE_URL: https://annabel-rene.tim-boo.com
      SESSION_SECRET: ${ANNABEL_RENE_SESSION_SECRET}
      ADMIN_PASSWORD: ${ANNABEL_RENE_ADMIN_PASSWORD}
      DATA_DIR: /data
    volumes:
      - /opt/dockerdata/annabel-rene/data:/data
    networks:
      - caddy_network

networks:
  caddy_network:
    external: true
    name: caddy_network
