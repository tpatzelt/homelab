services:
  dozzle:
    container_name: dozzle
    image: amir20/dozzle:v8.14.8
    env_file: ./.env
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOZZLE_ENABLE_ACTIONS: "true"
      DOZZLE_ENABLE_SHELL: "true"
    healthcheck:
      # Scratch image, no shell — dozzle ships its own healthcheck command
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - caddy_network

  pihole:
    # Network-wide ad blocking DNS server
    container_name: pihole
    image: pihole/pihole:2026.07.2
    env_file: ./.env
    restart: unless-stopped
    ports:
      - "53:53/tcp"      # DNS TCP
      - "53:53/udp"      # DNS UDP
    environment:
      PIHOLE_DNS_1: 8.8.8.8      # Upstream DNS (Google)
      PIHOLE_DNS_2: 8.8.4.4      # Upstream DNS fallback
      FTLCONF_dns_listeningMode: 'all'
      FTLCONF_webserver_api_password: '${PIHOLE_FTLCONF_webserver_api_password}'
      PIHOLE_UID: '${PUID}'
      PIHOLE_GID: '${PGID}'
    dns:
      - 127.0.0.1
    volumes:
      - /opt/dockerdata/pihole:/etc/pihole
    cap_add:
      - NET_ADMIN   # Required for DHCP and network interface management
      - SYS_TIME    # Required for time-based filtering rules
      - SYS_NICE    # Allows setting process priorities for better performance
    networks:
      - caddy_network

  heimdall:
    container_name: heimdall
    image: lscr.io/linuxserver/heimdall:2.8.1
    env_file: ./.env
    restart: unless-stopped
    volumes:
      - /opt/dockerdata/heimdall:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - caddy_network

  beszel:
    image: henrygd/beszel:0.18.2
    container_name: beszel
    env_file: ./.env
    restart: unless-stopped
    volumes:
      - /opt/dockerdata/beszel_data:/beszel_data
      - /var/run/beszel-socket:/beszel_socket
    healthcheck:
      # Scratch image, no shell — beszel ships its own health command
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - caddy_network

  beszel-agent:
    image: henrygd/beszel-agent:0.18.2
    container_name: beszel-agent
    env_file: ./.env
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run/beszel-socket:/beszel_socket
      - /opt/dockerdata/beszel_agent_data:/var/lib/beszel-agent
      - /mnt/storage/.beszel:/extra-filesystems/sdb2__Storage:ro
    environment:
      PORT: 45876
      KEY: '${BESZEL_AGENT_KEY}'
      TOKEN: '${BESZEL_TOKEN}'
      HUB_URL: '${BESZEL_HUB_URL}'
      LISTEN: /beszel_socket/beszel.sock
    healthcheck:
      # Scratch image, no shell — the agent binary checks its own socket
      test: ["CMD", "/agent", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  caddy_network:
    external: true
    name: caddy_network