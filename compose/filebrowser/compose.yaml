services:
  filebrowser:
    container_name: filebrowser
    image: filebrowser/filebrowser:latest
    env_file: ./.env
    user: "${PUID}:${PGID}"
    restart: unless-stopped
    volumes:
      - /mnt/storage/data:/srv
      - /opt/dockerdata/filebrowser/database:/database
      - /opt/dockerdata/filebrowser/config:/config
    networks:
      - caddy_network

networks:
  caddy_network:
    external: true
    name: caddy_network
