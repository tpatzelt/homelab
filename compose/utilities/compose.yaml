  karakeep:
    container_name: karakeep
    image: ghcr.io/karakeep-app/karakeep:0.32.0
    restart: unless-stopped
    volumes:
      - /opt/dockerdata/karakeep/data:/data
    env_file:
      - .env
    environment:
      MEILI_ADDR: http://karakeep-meilisearch:7700
      BROWSER_WEB_URL: http://karakeep-chrome:9222
      DATA_DIR: /data
    networks:
      - default
      - caddy_network

  karakeep-chrome:
    container_name: karakeep-chrome
    image: gcr.io/zenika-hub/alpine-chrome:124
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9222/json/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  karakeep-meilisearch:
    container_name: karakeep-meilisearch
    image: getmeili/meilisearch:v1.49.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - /opt/dockerdata/karakeep/meilisearch:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  ip-tracker:
    container_name: ip-tracker
    image: ghcr.io/tpatzelt/ip-tracker:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      IP_TRACKER_INTERVAL_MINUTES: "720"
    volumes:
      - /opt/dockerdata/ip-tracker/data:/app/data
    healthcheck:
      # Image has no wget/curl, but ships python3
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - default
      - caddy_network

networks:
  caddy_network:
    external: true
    name: caddy_network
