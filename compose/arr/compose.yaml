services:
  # VPN container - all *arr services use network_mode: service:gluetun to route traffic through VPN
  gluetun:
    image: qmcgaw/gluetun:v3
    env_file: ./.env
    container_name: gluetun
    cap_add:
      - NET_ADMIN  # Required for VPN tunnel management
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8888:8888/tcp # HTTP proxy
      - 8388:8388/tcp # Shadowsocks
      - 8388:8388/udp # Shadowsocks
    environment:
      - VPN_SERVICE_PROVIDER=airvpn
      - SERVER_COUNTRIES=Netherlands
      # Allow containers on gluetun_network to reach the VPN tunnel
      - FIREWALL_OUTBOUND_SUBNETS=172.60.0.0/24
      # Port forwarding for torrents (must match qBittorrent listening port)
      - FIREWALL_VPN_INPUT_PORTS=49906
      - VPN_IPV6=off
    volumes:
      - /opt/dockerdata/gluetun:/gluetun
    restart: unless-stopped
    networks:
      - gluetun_network
      - caddy_network

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:4.6.7
    container_name: qbittorrent
    env_file: ./.env
    environment:
      - WEBUI_PORT=8081
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/dockerdata/qbittorrent:/config
      - /mnt/storage/plexmedia:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8081"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.19
    env_file: ./.env
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/dockerdata/sonarr:/config
      - /mnt/storage/plexmedia:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8989/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy

  radarr:
    image: lscr.io/linuxserver/radarr:6.3.0
    container_name: radarr
    env_file: ./.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/dockerdata/radarr:/config
      - /mnt/storage/plexmedia:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:7878/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy

  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0
    container_name: lidarr
    env_file: ./.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/dockerdata/lidarr:/config
      - /mnt/storage/plexmedia:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8686/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy

  bazarr:
    image: lscr.io/linuxserver/bazarr:1.6.0
    container_name: bazarr
    env_file: ./.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/dockerdata/bazarr:/config
      - /mnt/storage/plexmedia:/data
    healthcheck:
      # bazarr has no unauthenticated /ping, so probe the web root
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:6767"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0
    container_name: prowlarr
    env_file: ./.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/dockerdata/prowlarr:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9696/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy

networks:
  gluetun_network:
    name: gluetun_network
    ipam:
      config:
        - subnet: 172.60.0.0/24

  caddy_network:
    external: true
    name: caddy_network
